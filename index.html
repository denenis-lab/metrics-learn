<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Metrics Learn</title>
<meta name="robots" content="noindex, nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#1a1a2e;--card:#16213e;--card-light:#1a2744;
--green:#0f9b58;--red:#e74c3c;--text:#e0e0e0;--heading:#fff;
--cat-revenue:#4ecdc4;--cat-profit:#f7dc6f;--cat-users:#bb8fce;
--cat-unit:#e59866;--cat-data:#85c1e9;--cat-crypto:#82e0aa;
--cat-finance:#f1948a;--cat-infra:#aeb6bf;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:440px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* Progress bar */
.progress-bar-wrap{padding:12px 16px 0;flex-shrink:0}
.progress-bar{height:6px;background:#0d1b2a;border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),#4ecdc4);border-radius:3px;transition:width .4s ease}
.progress-label{font-size:11px;color:#888;margin-top:4px;text-align:center}

/* Header */
.header{padding:8px 16px;text-align:center;flex-shrink:0}
.header h1{font-size:18px;font-weight:700;color:var(--heading)}

/* Main content area */
.tab-content{flex:1;position:relative;overflow:hidden}
.tab-panel{position:absolute;inset:0;display:none;flex-direction:column}
.tab-panel.active{display:flex}

/* Cards mode */
.cards-area{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden}
.card-container{position:relative;width:100%;max-width:360px;height:420px}
.card{position:absolute;width:100%;height:100%;border-radius:20px;background:var(--card);box-shadow:0 8px 32px rgba(0,0,0,.4);cursor:grab;touch-action:none;user-select:none;perspective:1000px;will-change:transform}
.card.dragging{cursor:grabbing;transition:none!important}
.card.fly-left{transition:transform .4s ease,opacity .3s ease;transform:translateX(-150%) rotate(-30deg)!important;opacity:0}
.card.fly-right{transition:transform .4s ease,opacity .3s ease;transform:translateX(150%) rotate(30deg)!important;opacity:0}
.card.fly-reset{transition:transform .3s cubic-bezier(.175,.885,.32,1.275)}

.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);border-radius:20px}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;padding:32px 24px;display:flex;flex-direction:column;overflow-y:auto}
.card-back{transform:rotateY(180deg);background:var(--card-light)}

/* Card front */
.card-category{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:auto;align-self:flex-start}
.card-front .metric-name{font-size:28px;font-weight:800;color:var(--heading);line-height:1.2;margin:auto 0;text-align:center}
.card-front .tap-hint{font-size:12px;color:#666;text-align:center;margin-top:auto}

/* Card back */
.card-back .metric-name-sm{font-size:18px;font-weight:700;color:var(--heading);margin-bottom:4px}
.card-back .metric-full{font-size:13px;color:#aaa;margin-bottom:12px}
.card-back .definition{font-size:14px;line-height:1.6;margin-bottom:16px;color:var(--text)}
.card-back .example{font-size:13px;line-height:1.5;color:#aaa;background:rgba(0,0,0,.2);padding:14px;border-radius:12px;border-left:3px solid var(--green)}

/* Overlay indicators */
.card-overlay{position:absolute;inset:0;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:900;opacity:0;pointer-events:none;z-index:10;transition:opacity .1s}
.card-overlay.like{background:rgba(15,155,88,.15);color:var(--green);border:3px solid var(--green)}
.card-overlay.nope{background:rgba(231,76,60,.15);color:var(--red);border:3px solid var(--red)}

/* Buttons */
.card-buttons{display:flex;justify-content:center;gap:24px;padding:16px;flex-shrink:0}
.card-btn{width:64px;height:64px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:28px;background:transparent;cursor:pointer;transition:transform .15s,background .15s}
.card-btn:active{transform:scale(.9)}
.card-btn.nope{border-color:var(--red);color:var(--red)}
.card-btn.nope:hover{background:rgba(231,76,60,.15)}
.card-btn.like{border-color:var(--green);color:var(--green)}
.card-btn.like:hover{background:rgba(15,155,88,.15)}

.empty-state{text-align:center;color:#666;padding:40px;display:none;flex-direction:column;align-items:center;gap:16px}
.empty-state.visible{display:flex}
.empty-state .emoji{font-size:48px}
.reset-deck-btn{padding:12px 28px;border-radius:12px;background:var(--green);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer}
.reset-deck-btn:active{transform:scale(.95)}

/* Quiz mode */
.quiz-area{flex:1;display:flex;flex-direction:column;padding:16px;overflow-y:auto}
.quiz-header{display:flex;justify-content:space-between;margin-bottom:16px;font-size:14px}
.quiz-streak{color:var(--green);font-weight:700}
.quiz-score{color:#aaa}
.quiz-question{background:var(--card);border-radius:16px;padding:24px;margin-bottom:20px;min-height:120px;display:flex;flex-direction:column;justify-content:center}
.quiz-question .q-label{font-size:12px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.quiz-question .q-text{font-size:17px;font-weight:600;color:var(--heading);line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-opt{padding:16px 20px;border-radius:14px;background:var(--card);border:2px solid transparent;font-size:15px;color:var(--text);cursor:pointer;transition:all .2s;text-align:left;line-height:1.4}
.quiz-opt:active{transform:scale(.97)}
.quiz-opt.correct{border-color:var(--green);background:rgba(15,155,88,.15);color:var(--green)}
.quiz-opt.wrong{border-color:var(--red);background:rgba(231,76,60,.15);color:var(--red)}
.quiz-opt.dimmed{opacity:.4}
.quiz-next{margin-top:20px;padding:14px;border-radius:14px;background:var(--green);color:#fff;border:none;font-size:16px;font-weight:600;cursor:pointer;display:none}
.quiz-next.visible{display:block}
.quiz-next:active{transform:scale(.97)}

/* Progress mode */
.progress-area{flex:1;padding:16px;overflow-y:auto;padding-bottom:80px}
.stat-card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:12px}
.stat-card h3{font-size:14px;color:#aaa;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.stat-row .label{font-size:14px;display:flex;align-items:center;gap:8px}
.stat-row .cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stat-row .bar-wrap{flex:1;height:8px;background:#0d1b2a;border-radius:4px;margin:0 12px;overflow:hidden}
.stat-row .bar-fill{height:100%;border-radius:4px;transition:width .4s}
.stat-row .val{font-size:13px;color:#aaa;min-width:36px;text-align:right}
.big-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.big-stat{background:var(--card);border-radius:16px;padding:20px;text-align:center}
.big-stat .num{font-size:36px;font-weight:800;color:var(--heading)}
.big-stat .lbl{font-size:12px;color:#888;margin-top:4px}
.reset-btn{width:100%;padding:14px;border-radius:14px;background:var(--red);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;opacity:.7}
.reset-btn:active{transform:scale(.97)}

/* Tab bar */
.tab-bar{display:flex;background:#0f0f23;border-top:1px solid #1e1e3a;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:10px 0;text-align:center;cursor:pointer;transition:color .2s}
.tab .tab-icon{font-size:22px;display:block;margin-bottom:2px}
.tab .tab-label{font-size:10px;letter-spacing:.5px}
.tab.active{color:var(--green)}
.tab:not(.active){color:#555}

/* Animations */
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.pulse{animation:pulse .15s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shake{animation:shake .3s ease}

/* Filter chips */
.filter-chips{display:flex;gap:6px;padding:0 16px 8px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-chips::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;white-space:nowrap;cursor:pointer;border:1.5px solid #333;color:#888;transition:all .2s;flex-shrink:0}
.chip.active{border-color:var(--green);color:var(--green);background:rgba(15,155,88,.1)}
</style>
</head>
<body>
<div class="app">
  <div class="progress-bar-wrap">
    <div class="progress-bar"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 / 0 изучено</div>
  </div>

  <div class="header"><h1>Wallet Finance Prep</h1></div>

  <div class="filter-chips" id="filterChips"></div>

  <div class="tab-content">
    <!-- Cards -->
    <div class="tab-panel active" id="panelCards">
      <div class="cards-area">
        <div class="card-container" id="cardContainer"></div>
        <div class="empty-state" id="emptyState">
          <div class="emoji">&#127881;</div>
          <div style="font-size:18px;color:var(--heading);font-weight:700">Все карточки пройдены!</div>
          <div style="font-size:14px">Вернитесь позже или сбросьте колоду</div>
          <button class="reset-deck-btn" onclick="resetDeck()">Начать заново</button>
        </div>
      </div>
      <div class="card-buttons" id="cardButtons">
        <button class="card-btn nope" onclick="swipeAction('left')">&#10007;</button>
        <button class="card-btn like" onclick="swipeAction('right')">&#10003;</button>
      </div>
    </div>

    <!-- Quiz -->
    <div class="tab-panel" id="panelQuiz">
      <div class="quiz-area">
        <div class="quiz-header">
          <span class="quiz-streak" id="quizStreak">&#128293; Серия: 0</span>
          <span class="quiz-score" id="quizScore">Счёт: 0</span>
        </div>
        <div class="quiz-question">
          <div class="q-label" id="qLabel">Определение</div>
          <div class="q-text" id="qText">Загрузка...</div>
        </div>
        <div class="quiz-options" id="quizOptions"></div>
        <button class="quiz-next" id="quizNext" onclick="nextQuizQuestion()">Следующий</button>
      </div>
    </div>

    <!-- Progress -->
    <div class="tab-panel" id="panelProgress">
      <div class="progress-area" id="progressArea"></div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" data-tab="panelCards" onclick="switchTab(this)">
      <span class="tab-icon">&#128195;</span>
      <span class="tab-label">Карточки</span>
    </div>
    <div class="tab" data-tab="panelQuiz" onclick="switchTab(this)">
      <span class="tab-icon">&#128300;</span>
      <span class="tab-label">Квиз</span>
    </div>
    <div class="tab" data-tab="panelProgress" onclick="switchTab(this)">
      <span class="tab-icon">&#128200;</span>
      <span class="tab-label">Прогресс</span>
    </div>
  </div>
</div>

<script>
// ─── DATA ───
const CATEGORIES = {
  'P&L Structure':        {color:'#f7dc6f',emoji:'📊'},
  'Unit Economics':       {color:'#e59866',emoji:'🔥'},
  'Users & Retention':    {color:'#bb8fce',emoji:'👥'},
  'Crypto & Wallet':      {color:'#82e0aa',emoji:'🪙'},
  'Revenue & Monetization':{color:'#4ecdc4',emoji:'💰'},
  'Financial Analysis':   {color:'#f1948a',emoji:'🔍'},
  'Accounting & FX':      {color:'#d4a5a5',emoji:'🏦'},
  'Data Infrastructure':  {color:'#aeb6bf',emoji:'🏗️'},
  'SQL & Technical Skills':{color:'#76d7c4',emoji:'⚡'},
  'Data Quality':         {color:'#85c1e9',emoji:'📈'}
};

const METRICS = [
  // ── P&L Structure (10) ──
  {id:'revenue',name:'Revenue',cat:'P&L Structure',full:'Выручка',
    def:'Общий объём денежных средств от реализации продукта. Верхняя строка P&L — всё начинается с неё. Не путать с прибылью: расходы ещё не вычтены.',
    ex:'Wallet: комиссии за buy/sell + spread на swap + fee от P2P + staking rewards = общий Revenue.'},
  {id:'cogs',name:'COGS',cat:'P&L Structure',full:'Cost of Goods Sold — Себестоимость',
    def:'Прямые переменные затраты на предоставление услуги конкретному клиенту. Вычитается из Revenue для получения Gross Profit. Не включает зарплаты офиса или маркетинг.',
    ex:'Wallet: gas fees блокчейна ($0.50 за транзакцию) + комиссия платёжного провайдера ($0.30) = COGS $0.80 на сделку.'},
  {id:'gross_profit',name:'Gross Profit',cat:'P&L Structure',full:'Валовая прибыль',
    def:'Revenue − COGS. Показывает, сколько остаётся после прямых затрат на предоставление услуги, до вычета операционных расходов.',
    ex:'Revenue $10M − COGS $3M = Gross Profit $7M.'},
  {id:'gross_margin',name:'Gross Margin',cat:'P&L Structure',full:'Валовая маржа (%)',
    def:'Gross Profit / Revenue × 100%. Показывает эффективность основного бизнеса в процентах. Позволяет сравнивать продукты разного масштаба.',
    ex:'Swap: Revenue $3M, COGS $0.8M → GM = 73%. P2P: Revenue $1M, COGS $0.1M → GM = 90%. P2P маржинальнее!'},
  {id:'opex',name:'OpEx',cat:'P&L Structure',full:'Operating Expenses — Операционные расходы',
    def:'Зарплаты, офисы, маркетинг, серверы — все расходы на ведение бизнеса, которые НЕ являются прямой себестоимостью (COGS). Вычитаются из Gross Profit.',
    ex:'Зарплаты $3M + маркетинг $1M + инфраструктура $0.5M + офисы $0.5M = OpEx $5M.'},
  {id:'ebitda',name:'EBITDA',cat:'P&L Structure',full:'Прибыль до вычета процентов, налогов, амортизации',
    def:'Revenue − COGS − OpEx + D&A (амортизация). Или проще: Operating Profit + D&A. Убирает неденежные расходы (амортизацию), чтобы показать операционный денежный поток бизнеса.',
    ex:'Revenue $10M, COGS $3M, OpEx $5M (включая D&A $0.5M) → EBIT = $2M → EBITDA = $2M + $0.5M = $2.5M.'},
  {id:'net_income',name:'Net Income',cat:'P&L Structure',full:'Чистая прибыль',
    def:'Что остаётся после ВСЕХ расходов: COGS + OpEx + проценты + налоги. Нижняя строка P&L. Включает неденежные статьи (амортизацию).',
    ex:'Revenue $10M → Gross Profit $7M → EBITDA $2.5M → EBIT $2M → Net Income $1.5M (после процентов и налогов).'},
  {id:'net_margin',name:'Net Margin',cat:'P&L Structure',full:'Чистая маржа (%)',
    def:'Net Income / Revenue × 100%. Итоговый процент выручки, который превращается в прибыль после всех расходов.',
    ex:'Net Income $1.5M / Revenue $10M = 15%. Для финтеха 10-20% — хороший показатель.'},
  {id:'contribution_margin',name:'Contribution Margin',cat:'P&L Structure',full:'Маржинальная прибыль на единицу',
    def:'Цена за единицу − Переменные затраты на единицу. Показывает, сколько каждая продажа вносит в покрытие постоянных расходов. Не путать с Gross Margin — CM считается на штуку.',
    ex:'Комиссия за swap $2 − gas fee $0.50 − провайдер $0.30 = CM = $1.20 с транзакции.'},
  {id:'pnl_breakdown',name:'P&L by Product',cat:'P&L Structure',full:'P&L в разрезе продуктов',
    def:'Отдельный P&L для каждого продукта/направления. Показывает, какой продукт реально зарабатывает, а какой субсидируется.',
    ex:'Buy/Sell: GM 60%, Swap: GM 73%, P2P: GM 90%, Staking: GM 95%. P2P и Staking — самые маржинальные.'},
  // ── Unit Economics (8) ──
  {id:'cac',name:'CAC',cat:'Unit Economics',full:'Customer Acquisition Cost — стоимость привлечения клиента',
    def:'Все маркетинговые расходы за период / количество новых клиентов за тот же период. Включает рекламу, зарплаты маркетологов, инструменты.',
    ex:'Потратили $500K на маркетинг, пришло 50K юзеров → CAC = $10.'},
  {id:'ltv',name:'LTV',cat:'Unit Economics',full:'Lifetime Value — пожизненная ценность клиента',
    def:'Совокупный доход (или маржа), который юзер приносит за всё время использования продукта. Формула: ARPU × Gross Margin × Avg Lifetime.',
    ex:'ARPU $10/мес × GM 60% × 8 мес средняя жизнь = LTV $48.'},
  {id:'ltv_cac',name:'LTV/CAC Ratio',cat:'Unit Economics',full:'Отношение ценности клиента к стоимости привлечения',
    def:'Главная метрика юнит-экономики. < 1 = убыток на каждом клиенте. 1-3 = на грани. > 3 = масштабируемый бизнес.',
    ex:'LTV $48 / CAC $10 = 4.8x — отлично, можно увеличивать маркетинговый бюджет.'},
  {id:'payback',name:'Payback Period',cat:'Unit Economics',full:'Срок окупаемости привлечения клиента',
    def:'Через сколько месяцев клиент окупает свой CAC. Формула: CAC / (ARPU × Contribution Margin). Чем короче — тем быстрее reinvest.',
    ex:'CAC $10, ARPU $10/мес, CM 60% → Payback = $10 / ($10 × 0.6) = 1.7 месяца.'},
  {id:'roi',name:'ROI',cat:'Unit Economics',full:'Return on Investment',
    def:'(Прибыль − Затраты) / Затраты × 100%. Универсальная метрика эффективности любых вложений.',
    ex:'Потратили $500K на маркетинг → заработали $2.4M revenue. ROI = ($2.4M − $0.5M) / $0.5M = 380%.'},
  {id:'arpu',name:'ARPU',cat:'Unit Economics',full:'Average Revenue Per User — средний доход на пользователя',
    def:'Общий Revenue / Все активные пользователи за период. Включает и платящих, и бесплатных. Базовая метрика монетизации.',
    ex:'Revenue $1M / 100K MAU = ARPU $10/мес.'},
  {id:'arppu',name:'ARPPU',cat:'Unit Economics',full:'Average Revenue Per Paying User — средний доход на платящего',
    def:'Revenue / Только платящие пользователи. Всегда выше ARPU. Показывает реальный чек тех, кто платит. Разница ARPU и ARPPU = конверсия в платящих.',
    ex:'Revenue $1M / 20K платящих = ARPPU $50/мес. При ARPU $10 → конверсия в платящих = 20%.'},
  {id:'unit_economics_txn',name:'Transaction Unit Economics',cat:'Unit Economics',full:'Юнит-экономика одной транзакции',
    def:'Разбор одной транзакции до атомарного уровня: Revenue − COGS = Gross Profit на единицу. Основа для моделирования масштаба.',
    ex:'Buy 100 USDT: комиссия $2.00 − gas $0.50 − провайдер $0.30 = Gross Profit $1.20. GM = 60%.'},
  // ── Users & Retention (7) ──
  {id:'churn',name:'Churn Rate',cat:'Users & Retention',full:'Коэффициент оттока клиентов',
    def:'Количество клиентов, ушедших за период / Количество клиентов на начало периода × 100%. Считается по фиксированной когорте, а не по текущей базе.',
    ex:'1000 клиентов на начало месяца, 50 ушли → Churn = 5%/мес. Годовой churn ≠ 5% × 12.'},
  {id:'retention',name:'Retention Rate',cat:'Users & Retention',full:'Коэффициент удержания клиентов',
    def:'Доля клиентов из начальной базы, которые остались активными через N дней/месяцев. Retention D30 = 40% значит 40% всё ещё пользуются через месяц. НЕ просто "1 − Churn" для когортного анализа.',
    ex:'Когорта: 10K юзеров. D1 = 60%, D7 = 40%, D30 = 25%. Для крипто-кошелька D30 > 20% — хорошо.'},
  {id:'cohort',name:'Cohort Analysis',cat:'Users & Retention',full:'Когортный анализ — сравнение поведения групп',
    def:'Группировка юзеров по дате регистрации. Позволяет сравнить: стала ли январская когорта лучше мартовской? Помогает оценить эффект изменений в продукте.',
    ex:'Когорта января: D30 = 40%. Когорта февраля (после нового онбординга): D30 = 50% — улучшение на 10пп!'},
  {id:'dau_mau',name:'DAU/MAU Ratio',cat:'Users & Retention',full:'Stickiness — частота возвращения',
    def:'Daily Active Users / Monthly Active Users. Показывает, какую долю месяца в среднем активен юзер. DAU/MAU = 30% → средний юзер заходит ~9 дней из 30.',
    ex:'DAU 500K / MAU 2M = 25%. Для кошелька 20-30% — норма (транзакции не каждый день).'},
  {id:'mrr',name:'MRR',cat:'Users & Retention',full:'Monthly Recurring Revenue — ежемесячная повторяющаяся выручка',
    def:'Предсказуемый ежемесячный доход от повторяющихся источников (подписки, регулярные комиссии). Основа для прогнозирования.',
    ex:'10K активных трейдеров × $15 avg комиссий/мес = MRR $150K.'},
  {id:'nrr',name:'NRR',cat:'Users & Retention',full:'Net Revenue Retention — чистое удержание выручки',
    def:'(MRR от существующих клиентов через 12 мес / MRR этих же клиентов год назад) × 100%. Учитывает апгрейды, даунгрейды и отток. > 100% = рост без привлечения новых.',
    ex:'NRR 110% — существующие юзеры платят на 10% больше YoY. NRR < 100% — теряем деньги даже с ростом базы.'},
  // ── Crypto & Wallet (9) ──
  {id:'gas_fee',name:'Gas Fee',cat:'Crypto & Wallet',full:'Комиссия сети за выполнение транзакции',
    def:'Плата блокчейну за обработку транзакции. Зависит от загруженности сети. Это часть COGS для Wallet — напрямую влияет на маржу.',
    ex:'Ethereum gas: $5-50 (дорого!). TON gas: $0.01-0.05 (дёшево). Выбор сети критически влияет на GM.'},
  {id:'spread',name:'Spread',cat:'Crypto & Wallet',full:'Разница между ценой покупки и продажи',
    def:'Разница между bid и ask ценой. Один из основных источников дохода для кошельков и бирж. Юзер платит spread при каждом обмене.',
    ex:'BTC buy: $60,100, sell: $60,000. Spread = $100 (0.17%). Wallet зарабатывает на этой разнице.'},
  {id:'on_ramp',name:'On-ramp / Off-ramp',cat:'Crypto & Wallet',full:'Вход фиат→крипто и выход крипто→фиат',
    def:'On-ramp: покупка крипты за фиат (карта/перевод → USDT). Off-ramp: продажа крипты за фиат. Обычно самая высокая комиссия из всех продуктов.',
    ex:'Юзер покупает USDT за $1000 картой Visa. Комиссия 2.5% = $25. Из них: Wallet $15, провайдер $10.'},
  {id:'settlement',name:'Settlement',cat:'Crypto & Wallet',full:'Финальное завершение расчёта (необратимость)',
    def:'Момент, когда транзакция окончательно завершена и необратима. Критично для revenue recognition: до settlement — это не доход.',
    ex:'On-chain: settlement за 1 сек (TON) или 15 мин (Bitcoin). Через карту: settlement 1-3 рабочих дня.'},
  {id:'revenue_recognition',name:'Revenue Recognition',cat:'Crypto & Wallet',full:'Признание выручки — когда считать доход',
    def:'Правило бухучёта: доход признаётся, когда услуга оказана и оплата необратима. Для крипто-кошелька разные продукты имеют разные точки признания.',
    ex:'«Buy» нажат → pending (НЕ revenue) → confirmed on-chain (revenue для крипто-комиссии) → Visa settled (revenue для on-ramp).'},
  {id:'kyc_aml',name:'KYC / AML',cat:'Crypto & Wallet',full:'Know Your Customer / Anti-Money Laundering',
    def:'KYC — проверка личности (паспорт, фото). AML — мониторинг подозрительных транзакций. Регуляторное требование, влияющее на конверсию и лимиты.',
    ex:'Без KYC — лимит $300/мес. KYC L1 (фото + ID) — до $10K. KYC L2 (видео) — без лимитов. Каждый шаг = потеря юзеров.'},
  {id:'staking',name:'Staking',cat:'Crypto & Wallet',full:'Замораживание крипты для получения вознаграждения',
    def:'Юзер «ставит» токены в сеть и получает % годовых (APY). Wallet берёт комиссию от rewards юзера. Пассивный доход для обеих сторон.',
    ex:'Юзер стейкает 10,000 TON. APY = 5%. Через год: +500 TON rewards. Wallet берёт 10% = 50 TON.'},
  {id:'tvl',name:'TVL',cat:'Crypto & Wallet',full:'Total Value Locked — общая заблокированная стоимость',
    def:'Суммарная стоимость активов, хранящихся в кошельке/протоколе. Метрика масштаба и доверия. Рост TVL → рост потенциального дохода.',
    ex:'TVL Wallet = $2B — юзеры хранят активы на $2B. Стейкинг TVL $500M × APY 5% × комиссия 10% = $2.5M/год revenue.'},
  {id:'p2p',name:'P2P Trading',cat:'Crypto & Wallet',full:'Peer-to-Peer — торговля между юзерами напрямую',
    def:'Юзеры покупают/продают крипту друг у друга. Wallet — эскроу-посредник, берёт комиссию с продавца. Самый маржинальный канал (нет gas/провайдеров).',
    ex:'Юзер А продаёт 1000 USDT юзеру Б за рубли. Комиссия 0.5% с продавца = $5. GM ≈ 90%.'},
  // ── Revenue & Monetization (7) ──
  {id:'wallet_revenue_buy',name:'Buy/Sell Revenue',cat:'Revenue & Monetization',full:'Доход от покупки/продажи крипты',
    def:'Фиксированная комиссия 1-3% от суммы сделки при покупке или продаже крипты. Самый большой по объёму канал Revenue.',
    ex:'Юзер покупает BTC за $1000. Комиссия 2% = $20. COGS: gas $5 + провайдер $3 = $8. GP = $12. GM = 60%.'},
  {id:'wallet_revenue_swap',name:'Swap Revenue',cat:'Revenue & Monetization',full:'Доход от обмена токенов внутри кошелька',
    def:'Заработок на spread (разнице курсов) при обмене одного токена на другой. Юзер не видит комиссию явно — она заложена в курс.',
    ex:'Юзер свопает 1000 USDT → TON. Spread 0.5% → Wallet зарабатывает $5. COGS: gas $0.05 → GM = 99%.'},
  {id:'wallet_revenue_p2p',name:'P2P Revenue',cat:'Revenue & Monetization',full:'Доход от P2P-торговли между юзерами',
    def:'Комиссия с продавца при P2P-сделках. Wallet выступает эскроу. Минимальные COGS (нет gas/провайдеров) → самая высокая маржа.',
    ex:'Сделка на $2000 USDT, комиссия 0.5% с продавца = $10. COGS ≈ $1 → GM ≈ 90%.'},
  {id:'wallet_revenue_staking',name:'Staking Revenue',cat:'Revenue & Monetization',full:'Доход от комиссии за стейкинг',
    def:'Процент от вознаграждений юзера за стейкинг. Пассивный доход — растёт вместе с TVL без дополнительных транзакций.',
    ex:'TVL в стейкинге $100M, APY 5%, комиссия Wallet 10% = $500K/год. Пассивный и предсказуемый.'},
  {id:'wallet_revenue_onramp',name:'On-ramp Revenue',cat:'Revenue & Monetization',full:'Доход от конвертации фиат→крипто',
    def:'Комиссия при покупке крипты за фиат. Делится между Wallet и платёжным провайдером. Самая высокая абсолютная комиссия, но и самый высокий COGS.',
    ex:'Покупка USDT за $1000 с Visa. Общая комиссия 2.5% = $25. Wallet $15, провайдер $10. GM = 60%.'},
  {id:'wallet_pay',name:'Wallet Pay',cat:'Revenue & Monetization',full:'Оплата товаров/услуг через Wallet',
    def:'Мерчанты принимают крипто-оплату через Wallet API. Комиссия с мерчанта за каждую транзакцию. Новый канал монетизации.',
    ex:'Юзер платит $50 за подписку через Wallet Pay. Мерчант платит 1% = $0.50.'},
  {id:'take_rate',name:'Take Rate',cat:'Revenue & Monetization',full:'Процент от GMV, который забирает платформа',
    def:'Revenue / GMV × 100%. Ключевая метрика для marketplace и платёжных систем. Показывает монетизационную эффективность объёма.',
    ex:'GMV (объём всех транзакций) = $500M, Revenue = $10M → Take Rate = 2%.'},
  // ── Financial Analysis (12) ──
  {id:'variance_analysis',name:'Variance Analysis',cat:'Financial Analysis',full:'Анализ отклонений (план vs факт)',
    def:'Сравнение бюджетных (plan) и фактических (actual) показателей. Favorable = факт лучше плана. Unfavorable = хуже. CFO спрашивает: ПОЧЕМУ отклонение?',
    ex:'Revenue plan $1M, actual $900K → Unfavorable variance $100K (−10%). Причина: Swap revenue −$80K из-за роста gas fees.'},
  {id:'bridge_analysis',name:'Bridge Analysis',cat:'Financial Analysis',full:'Декомпозиция изменения на компоненты (volume/price/mix)',
    def:'Разложение изменения метрики на эффекты: Volume (количество), Price (средний чек), Mix (структура продуктов). Отвечает на «почему изменилось».',
    ex:'Revenue Q2 vs Q1: +$200K. Volume effect +$300K (больше юзеров), Price effect −$50K (снизили комиссию), Mix effect −$50K (доля P2P упала).'},
  {id:'anomaly_detection',name:'Anomaly Detection',cat:'Financial Analysis',full:'Обнаружение аномалий в финансовых данных',
    def:'Автоматическое нахождение резких отклонений метрик. Методы: % от среднего, Z-score (>2σ), moving average deviation. Первый шаг — найти, второй — объяснить.',
    ex:'Revenue сегодня $80K, MA(7) = $100K → отклонение −20% → алерт! Декомпозиция по продукту → Swap −$15K из-за Ethereum congestion.'},
  {id:'decomposition',name:'Metric Decomposition',cat:'Financial Analysis',full:'Разложение метрики на составляющие',
    def:'Revenue = Users × Transactions/User × Avg Check × Take Rate. При падении — разложи на множители и найди, какой упал. Drill-down по продукту, гео, сегменту.',
    ex:'Revenue −20%: Users −5%, Txns/User −10%, Avg Check −5%. Основная причина — частота транзакций. Почему?'},
  {id:'scenario_analysis',name:'Scenario Analysis',cat:'Financial Analysis',full:'Анализ сценариев: pessimistic / base / optimistic',
    def:'Три прогноза с разными вводными. Base — для бюджета. Pessimistic — для плана Б. Optimistic — для целей. Каждый сценарий привязан к конкретным допущениям.',
    ex:'Q2: Pessimistic $270K (30K юзеров, churn 8%), Base $900K (50K, churn 5%), Optimistic $3M (80K, churn 3%).'},
  {id:'sensitivity',name:'Sensitivity Analysis',cat:'Financial Analysis',full:'Анализ чувствительности — что влияет сильнее',
    def:'Изменяешь по одному параметру на ±10% и смотришь, какой сильнее влияет на целевую метрику. Помогает приоритизировать инициативы.',
    ex:'Retention +10% → Revenue +15%. CAC −10% → Profit +8%. Вывод: инвестировать в retention выгоднее, чем снижать CAC.'},
  {id:'forecasting',name:'Forecasting',cat:'Financial Analysis',full:'Прогнозирование метрик',
    def:'Предсказание будущих значений. Методы: трендовый (исторический рост), сезонный, driver-based (от драйверов бизнеса), bottom-up (от unit economics).',
    ex:'Revenue Q3: тренд +10% QoQ, сезонность лета −5%, новый продукт +15% → прогноз +20%. Driver-based: 60K users × $15 ARPU = $900K.'},
  {id:'margin_analysis',name:'Margin Analysis',cat:'Financial Analysis',full:'Анализ изменения маржи',
    def:'Если маржа упала — найди причину. Три гипотезы: выросли ли затраты (COGS)? Изменился ли product mix? Упал ли средний чек?',
    ex:'GM упала с 73% до 65%: gas fees выросли на 40% → COGS/txn выросла с $0.50 до $0.70. Product mix не изменился → проблема в COGS.'},
  {id:'hypothesis_testing',name:'Financial Hypothesis',cat:'Financial Analysis',full:'Формулировка и проверка финансовых гипотез',
    def:'Наблюдение → Гипотеза → Данные для проверки → Вывод → Рекомендация CFO. Аналитик не просто показывает цифры, а объясняет причинно-следственную связь.',
    ex:'Swap revenue ↓20%. Гипотеза: юзеры ушли на DEX из-за gas. Проверка: on-chain volumes упали у всех CEX → рыночный тренд, не наша проблема.'},
  {id:'reconciliation',name:'Reconciliation',cat:'Financial Analysis',full:'Сверка данных между источниками',
    def:'Проверка, что одна и та же метрика совпадает в разных системах (дашборд vs бухгалтерия vs провайдер). Если расхождение — найти причину до копейки.',
    ex:'Дашборд: Revenue $1.05M. Бухгалтерия: $1.02M. Разница $30K = pending транзакции, которые ещё не прошли settlement.'},
  {id:'cohort_revenue',name:'Revenue Cohort Analysis',cat:'Financial Analysis',full:'Анализ выручки по когортам',
    def:'Отслеживание ARPU/Revenue по когортам во времени. Показывает: растёт ли юзер в деньгах (expansion) или падает (contraction) после регистрации.',
    ex:'Когорта янв: ARPU M1=$5, M3=$8, M6=$12 (expansion!). Когорта мар: M1=$5, M3=$4 (contraction) — что изменилось в продукте?'},
  {id:'waterfall',name:'Waterfall Analysis',cat:'Financial Analysis',full:'Каскадный анализ: от прошлого к текущему через дельты',
    def:'Визуализация перехода между значениями через положительные и отрицательные компоненты. Идеально для объяснения изменений MRR или P&L на board meeting.',
    ex:'MRR: $100K → +$20K новые → +$5K апгрейды → −$8K churn → −$2K даунгрейды = $115K.'},
  // ── Accounting & FX (4) ──
  {id:'accrual_vs_cash',name:'Accrual vs Cash',cat:'Accounting & FX',full:'Метод начисления vs кассовый метод',
    def:'Cash basis: доход при получении денег. Accrual basis: доход при оказании услуги (даже если деньги ещё не пришли). Финтех обязан вести accrual для отчётности.',
    ex:'Юзер купил подписку на 12 мес за $120. Cash = $120 в январе. Accrual = $10/мес на 12 месяцев. P&L выглядит по-разному!'},
  {id:'fx_risk',name:'FX / Currency Risk',cat:'Accounting & FX',full:'Валютный риск при мультивалютных операциях',
    def:'Риск потери денег из-за изменения курса валют. Для крипто-кошелька: фиатные комиссии в разных валютах, но отчётность в USD. Волатильность крипты — отдельный риск.',
    ex:'Wallet берёт комиссию в рублях, отчитывается в USD. RUB/USD упал 5% → revenue в USD упала 5% при том же объёме в рублях.'},
  {id:'burn_rate',name:'Burn Rate & Runway',cat:'Accounting & FX',full:'Скорость сжигания денег и запас прочности',
    def:'Net Burn Rate = Расходы − Доходы за месяц. Runway = Cash на счету / Net Burn Rate = сколько месяцев проживём. Gross Burn = только расходы (без дохода).',
    ex:'Расходы $350K, Revenue $200K → Net Burn = $150K/мес. Cash $3M → Runway = 20 мес. Gross Burn = $350K (если revenue упадёт до 0).'},
  {id:'deferred_revenue',name:'Deferred Revenue',cat:'Accounting & FX',full:'Отложенная выручка (обязательство)',
    def:'Деньги получены, но услуга ещё не оказана. Это обязательство в балансе, не доход. По мере оказания услуги — переводится в Revenue.',
    ex:'Юзер заплатил $120 за годовой PRO. В балансе: $120 deferred revenue. Каждый месяц: −$10 deferred, +$10 revenue.'},
  // ── Data Infrastructure (7) ──
  {id:'dbt',name:'dbt',cat:'Data Infrastructure',full:'Data Build Tool — SQL-трансформации с версионированием',
    def:'Инструмент, где пишешь SELECT-запросы в файлах, они версионируются в Git. dbt сам создаёт таблицы/views. Декларативный подход: описываешь ЧТО, а не КАК.',
    ex:'stg_transactions.sql: SELECT * FROM {{ source("raw","txns") }} WHERE status != \'test\'. dbt run → таблица в ClickHouse.'},
  {id:'dbt_ref',name:'ref() и source()',cat:'Data Infrastructure',full:'Функции зависимостей в dbt (граф lineage)',
    def:'source() = ссылка на сырые данные. ref() = ссылка на другую dbt-модель. Через них dbt строит DAG (граф зависимостей) и определяет порядок выполнения.',
    ex:'marts/revenue.sql: SELECT ... FROM {{ ref("stg_transactions") }}. dbt знает: сначала stg, потом marts. Lineage виден в docs.'},
  {id:'dbt_tests',name:'dbt Tests',cat:'Data Infrastructure',full:'Автоматические тесты качества данных',
    def:'Встроенные тесты: unique (нет дубликатов), not_null, accepted_values, relationships (FK). При нарушении — pipeline падает, не тихо ломая дашборд.',
    ex:'schema.yml: tests: [unique, not_null] для transaction_id. Дубль → pipeline error → Slack alert → аналитик чинит до того, как CFO увидит.'},
  {id:'dbt_layers',name:'Staging → Intermediate → Marts',cat:'Data Infrastructure',full:'Слои данных в dbt-проекте',
    def:'staging = очистка сырых данных (типы, фильтры). intermediate = промежуточные агрегации. marts = финальные витрины для дашбордов и отчётов.',
    ex:'raw.txns → stg_transactions (cast, filter) → int_daily_revenue (GROUP BY date) → mart_finance_daily (joins, final) → Superset.'},
  {id:'superset',name:'Apache Superset',cat:'Data Infrastructure',full:'Open-source BI для финансовых дашбордов',
    def:'Бесплатный self-hosted BI: пишешь SQL → строишь чарты → собираешь дашборды. SQL-first подход. Основной инструмент Wallet для финансовой визуализации.',
    ex:'Superset vs Tableau: бесплатный, SQL-first, self-hosted. Vs Streamlit: не нужен Python, проще для бизнес-юзеров. Минус: меньше кастомизации.'},
  {id:'clickhouse',name:'ClickHouse',cat:'Data Infrastructure',full:'Колоночная OLAP-база для быстрых агрегаций',
    def:'Колоночное хранение → молниеносный GROUP BY на миллиардах строк. Слабые стороны: JOIN-ы, UPDATE/DELETE. Основная аналитическая БД Wallet.',
    ex:'1B транзакций. GROUP BY product, date — 0.5 сек в ClickHouse vs 30 мин в PostgreSQL.'},
  {id:'grafana',name:'Grafana',cat:'Data Infrastructure',full:'Real-time мониторинг и алертинг',
    def:'Дашборды реального времени + настраиваемые алерты. Когда метрика выходит за порог → Slack/PagerDuty. Для оперативного мониторинга, не для глубокой аналитики.',
    ex:'Alert: «Revenue за последний час < $5K» → Slack → дежурный проверяет. Grafana = мониторинг 24/7, Superset = аналитические дашборды.'},
  // ── SQL & Technical Skills (5) ──
  {id:'sql_window',name:'Window Functions',cat:'SQL & Technical Skills',full:'Оконные функции для финансовой аналитики',
    def:'Функции, работающие с набором строк без группировки: ROW_NUMBER, LAG/LEAD (сравнение с предыдущим периодом), SUM OVER (running total), RANK.',
    ex:'SELECT date, revenue, LAG(revenue) OVER (ORDER BY date) AS prev_day, revenue - LAG(revenue) OVER (ORDER BY date) AS delta FROM mart_daily.'},
  {id:'sql_running_total',name:'Running Totals & Cumulative',cat:'SQL & Technical Skills',full:'Накопительные итоги и кумулятивные метрики',
    def:'SUM(revenue) OVER (ORDER BY date) — нарастающий итог. Нужен для cumulative revenue, cash balance, MTD/YTD метрик.',
    ex:'SELECT date, revenue, SUM(revenue) OVER (ORDER BY date ROWS UNBOUNDED PRECEDING) AS cumulative_revenue — MTD revenue.'},
  {id:'clickhouse_specifics',name:'ClickHouse Functions',cat:'SQL & Technical Skills',full:'Специфичные функции ClickHouse для финансов',
    def:'toStartOfMonth(), toStartOfWeek() — агрегация по периодам. argMax() — значение столбца при максимуме другого. Materialized Views — преагрегация данных.',
    ex:'SELECT toStartOfMonth(txn_date) AS month, sum(revenue) FROM txns GROUP BY month. Materialized View: автоматическая daily агрегация при INSERT.'},
  {id:'sql_cohort_query',name:'Cohort SQL Pattern',cat:'SQL & Technical Skills',full:'SQL-паттерн для когортного анализа',
    def:'JOIN юзеров с их первым действием (регистрация), затем GROUP BY когорта + период. dateDiff() для расчёта месяца жизни юзера.',
    ex:'SELECT cohort_month, life_month, COUNT(DISTINCT user_id) / cohort_size AS retention FROM (...) — готовая retention-таблица для heatmap.'},
  {id:'sql_dedup',name:'Deduplication in SQL',cat:'SQL & Technical Skills',full:'Дедупликация транзакций в SQL',
    def:'ROW_NUMBER() OVER (PARTITION BY txn_id ORDER BY updated_at DESC) = 1. В блокчейне retry = дубли. В провайдерских данных — повторные вебхуки.',
    ex:'WITH deduped AS (SELECT *, ROW_NUMBER() OVER (PARTITION BY txn_id ORDER BY created_at DESC) AS rn FROM raw_txns) SELECT * FROM deduped WHERE rn = 1.'},
  // ── Data Quality (5) ──
  {id:'completeness',name:'Data Completeness',cat:'Data Quality',full:'Полнота данных — процент заполненных полей',
    def:'Доля строк, где ключевые поля не NULL. Неполные данные → неправильные метрики. Задача: найти паттерн (какой источник/провайдер отдаёт NULL) и починить.',
    ex:'95% транзакций имеют product_type, 5% — NULL. Все NULL от провайдера X → починить ETL. Иначе P&L by Product неточен.'},
  {id:'freshness',name:'Data Freshness',cat:'Data Quality',full:'Свежесть данных — задержка от события до хранилища',
    def:'Время от реального события до его появления в аналитической базе. Для финансовых дашбордов критично: CFO не должен видеть вчерашние данные.',
    ex:'Транзакция в 10:00, в ClickHouse в 10:05 → Freshness = 5 мин. Допустимо для real-time. Для batch ETL — 1-2 часа.'},
  {id:'drift',name:'Data Drift',cat:'Data Quality',full:'Дрейф — изменение распределения данных',
    def:'Распределение данных меняется со временем. Может быть сигналом бизнес-изменения или бага. Методы детекции: мониторинг mean/median/percentiles.',
    ex:'Средний чек swap вырос с $50 до $200 за месяц. Drift detected. Причина: крупные юзеры (whale effect) или баг в расчёте?'},
  {id:'messy_data',name:'Messy Data at Scale',cat:'Data Quality',full:'Работа с грязными данными в продакшене',
    def:'Миллионы транзакций/день, разные статусы (pending→confirmed→settled→failed), retry-дубликаты, расхождения blockchain vs провайдер. Задача: чистые цифры для CFO.',
    ex:'Статусы: pending→confirmed→settled→failed. Retry = дубли. Blockchain сумма ≠ провайдер сумма. Дедупликация + reconciliation + алерты.'},
  {id:'data_monitoring',name:'Data Monitoring',cat:'Data Quality',full:'Автоматический мониторинг качества данных',
    def:'Регулярные проверки: freshness, row count, null rate, distribution. При отклонении → алерт. Ловит проблемы до того, как CFO увидит сломанный дашборд.',
    ex:'Ежечасно: кол-во строк в stg_transactions. Если 0 за последний час → алерт → ETL сломался. Ежедневно: revenue vs вчера ±30%.'}
];

// ─── STATE ───
const LS_KEY = 'metrics_learn_v3';
let state;

function defaultState(){
  return {
    cards:{},
    quiz:{score:0,streak:0,bestStreak:0,total:0,correct:0},
    lastActive:Date.now(),
    dayStreak:0,
    lastDay:null,
    activeFilter:null
  };
}

function loadState(){
  let loaded=null;
  try{loaded=JSON.parse(localStorage.getItem(LS_KEY))}catch(e){}
  if(!loaded){try{loaded=JSON.parse(sessionStorage.getItem(LS_KEY))}catch(e){}}
  if(!loaded&&location.hash.length>1){
    try{loaded=JSON.parse(decodeURIComponent(location.hash.slice(1)))}catch(e){}
  }
  state=loaded||defaultState();
  if(!state.cards)state.cards={};
  if(!state.quiz)state.quiz={score:0,streak:0,bestStreak:0,total:0,correct:0};
  const today=new Date().toDateString();
  if(!state.lastDay){
    state.dayStreak=1;
  }else if(state.lastDay!==today){
    const last=new Date(state.lastDay),now=new Date(today);
    const diff=Math.round((now-last)/(1000*60*60*24));
    if(diff===1)state.dayStreak=(state.dayStreak||0)+1;
    else if(diff>1)state.dayStreak=1;
  }
  if(!state.dayStreak)state.dayStreak=1;
  state.lastDay=today;
  saveState();
}

function saveState(){
  state.lastActive=Date.now();
  const json=JSON.stringify(state);
  try{localStorage.setItem(LS_KEY,json)}catch(e){}
  try{sessionStorage.setItem(LS_KEY,json)}catch(e){}
  try{
    const compact={cards:state.cards,quiz:state.quiz,dayStreak:state.dayStreak,lastDay:state.lastDay};
    history.replaceState(null,'','#'+encodeURIComponent(JSON.stringify(compact)));
  }catch(e){}
}

function getCardState(id){
  if(!state.cards[id])state.cards[id]={interval:1,nextReview:0,mastered:false};
  return state.cards[id];
}

// ─── CARDS MODE ───
let deck=[];
let currentCard=null;
let isDragging=false, startX=0, startY=0, currentX=0, cardEl=null;
let isFlipped=false, isAnimating=false;

function buildDeck(){
  const now=Date.now();
  const filter=state.activeFilter;
  deck=METRICS.filter(m=>{
    if(filter&&m.cat!==filter)return false;
    const cs=getCardState(m.id);
    return !cs.mastered||cs.nextReview<=now;
  });
  deck.sort((a,b)=>{
    const ca=getCardState(a.id),cb=getCardState(b.id);
    if(ca.mastered!==cb.mastered)return ca.mastered?1:-1;
    return ca.nextReview-cb.nextReview;
  });
}

function showNextCard(){
  const container=document.getElementById('cardContainer');
  const empty=document.getElementById('emptyState');
  const btns=document.getElementById('cardButtons');

  if(deck.length===0){
    container.innerHTML='';
    empty.classList.add('visible');
    btns.style.display='none';
    currentCard=null;
    return;
  }

  empty.classList.remove('visible');
  btns.style.display='flex';
  currentCard=deck[0];
  isFlipped=false;

  const cat=CATEGORIES[currentCard.cat];
  container.innerHTML=`
    <div class="card" id="activeCard">
      <div class="card-overlay like">&#10003;</div>
      <div class="card-overlay nope">&#10007;</div>
      <div class="card-inner">
        <div class="card-face card-front">
          <span class="card-category" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44">
            ${cat.emoji} ${currentCard.cat}
          </span>
          <div class="metric-name">${currentCard.name}</div>
          <div class="tap-hint">Нажми, чтобы перевернуть</div>
        </div>
        <div class="card-face card-back">
          <div class="metric-name-sm">${currentCard.name}</div>
          <div class="metric-full">${currentCard.full}</div>
          <div class="definition">${currentCard.def}</div>
          <div class="example">${currentCard.ex}</div>
        </div>
      </div>
    </div>`;

  cardEl=document.getElementById('activeCard');
  attachCardEvents(cardEl);
  updateProgress();
}

function attachCardEvents(el){
  let tapStartTime=0,tapMoved=false;

  function onStart(e){
    if(isAnimating)return;
    const t=e.touches?e.touches[0]:e;
    startX=t.clientX;startY=t.clientY;currentX=0;
    isDragging=true;tapStartTime=Date.now();tapMoved=false;
    el.classList.add('dragging');
    el.classList.remove('fly-reset');
  }

  function onMove(e){
    if(!isDragging||isAnimating)return;
    const t=e.touches?e.touches[0]:e;
    currentX=t.clientX-startX;
    const currentY=t.clientY-startY;
    if(Math.abs(currentX)>15||Math.abs(currentY)>15)tapMoved=true;
    const rot=currentX*0.08;
    const clampedRot=Math.max(-15,Math.min(15,rot));
    el.style.transform=`translateX(${currentX}px) rotate(${clampedRot}deg)`;

    const likeOv=el.querySelector('.card-overlay.like');
    const nopeOv=el.querySelector('.card-overlay.nope');
    const pct=Math.min(Math.abs(currentX)/120,1);
    if(currentX>0){likeOv.style.opacity=pct;nopeOv.style.opacity=0}
    else{nopeOv.style.opacity=pct;likeOv.style.opacity=0}

    if(e.cancelable)e.preventDefault();
  }

  function onEnd(){
    if(!isDragging||isAnimating)return;
    isDragging=false;
    el.classList.remove('dragging');
    el.querySelector('.card-overlay.like').style.opacity=0;
    el.querySelector('.card-overlay.nope').style.opacity=0;

    const threshold=80;
    if(Math.abs(currentX)>threshold){
      flyCard(currentX>0?'right':'left');
    } else if(!tapMoved&&Date.now()-tapStartTime<500){
      flipCard();
      el.style.transform='';
    } else {
      el.classList.add('fly-reset');
      el.style.transform='';
    }
    currentX=0;
  }

  el.addEventListener('touchstart',onStart,{passive:true});
  el.addEventListener('touchmove',onMove,{passive:false});
  el.addEventListener('touchend',onEnd);
  el.addEventListener('mousedown',onStart);
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onEnd);
}

function flipCard(){
  if(!cardEl||isAnimating)return;
  isFlipped=!isFlipped;
  if(isFlipped)cardEl.classList.add('flipped');
  else cardEl.classList.remove('flipped');
  cardEl.classList.add('pulse');
  setTimeout(()=>cardEl.classList.remove('pulse'),150);
}

function flyCard(dir){
  if(!currentCard||isAnimating)return;
  isAnimating=true;
  const el=document.getElementById('activeCard');
  if(el)el.classList.add(dir==='right'?'fly-right':'fly-left');

  const cs=getCardState(currentCard.id);
  if(dir==='right'){
    cs.interval=Math.min(cs.interval*2,64);
    cs.nextReview=Date.now()+cs.interval*24*60*60*1000;
    cs.mastered=cs.interval>=2;
  }else{
    cs.interval=1;
    cs.nextReview=Date.now()+60*1000;
    cs.mastered=false;
  }
  saveState();

  setTimeout(()=>{
    deck.shift();
    isAnimating=false;
    showNextCard();
    updateProgress();
  },350);
}

function swipeAction(dir){
  if(!currentCard||isAnimating)return;
  flyCard(dir);
}

function resetDeck(){
  const filter=state.activeFilter;
  METRICS.forEach(m=>{
    if(!filter||m.cat===filter){
      state.cards[m.id]={interval:1,nextReview:0,mastered:false};
    }
  });
  saveState();
  buildDeck();
  showNextCard();
}

// ─── FILTER CHIPS ───
function renderFilterChips(){
  const wrap=document.getElementById('filterChips');
  let html='<div class="chip'+(state.activeFilter?'':' active')+'" onclick="setFilter(null)">Все</div>';
  Object.keys(CATEGORIES).forEach(cat=>{
    const c=CATEGORIES[cat];
    const active=state.activeFilter===cat?' active':'';
    html+=`<div class="chip${active}" onclick="setFilter('${cat}')" style="${active?'border-color:'+c.color+';color:'+c.color+';background:'+c.color+'15':''}">${c.emoji} ${cat}</div>`;
  });
  wrap.innerHTML=html;
}

function setFilter(cat){
  state.activeFilter=cat;
  saveState();
  renderFilterChips();
  buildDeck();
  showNextCard();
}

// ─── PROGRESS ───
function updateProgress(){
  const filter=state.activeFilter;
  const relevant=METRICS.filter(m=>!filter||m.cat===filter);
  const mastered=relevant.filter(m=>getCardState(m.id).mastered).length;
  const total=relevant.length;
  const pct=total?Math.round(mastered/total*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${mastered} / ${total} изучено`;
}

// ─── QUIZ MODE ───
let quizAnswered=false;

function generateQuizQuestion(){
  quizAnswered=false;
  document.getElementById('quizNext').classList.remove('visible');

  // Mix question types: name→def, def→name, example→name, category→metrics
  const questionType=Math.random();
  const m=METRICS[Math.floor(Math.random()*METRICS.length)];
  const qLabel=document.getElementById('qLabel');
  const qText=document.getElementById('qText');

  let correctAnswer,options;

  if(questionType<0.3){
    // Name → Definition
    qLabel.textContent='Что это за метрика?';
    qText.textContent=m.name+(m.full!==m.name?' ('+m.full+')':'');
    correctAnswer=m.def;
    const others=METRICS.filter(x=>x.id!==m.id).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.def);
    options=[correctAnswer,...others].sort(()=>Math.random()-.5);
  }else if(questionType<0.6){
    // Definition → Name
    qLabel.textContent='Какая метрика описана?';
    qText.textContent=m.def;
    correctAnswer=m.name;
    const others=METRICS.filter(x=>x.id!==m.id).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.name);
    options=[correctAnswer,...others].sort(()=>Math.random()-.5);
  }else if(questionType<0.8){
    // Example → Name
    qLabel.textContent='К какой метрике этот пример?';
    qText.textContent=m.ex;
    correctAnswer=m.name;
    const others=METRICS.filter(x=>x.id!==m.id&&x.cat!==m.cat).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.name);
    options=[correctAnswer,...others].sort(()=>Math.random()-.5);
  }else{
    // Category question
    qLabel.textContent='К какой категории относится?';
    qText.textContent=m.name+' — '+m.full;
    correctAnswer=m.cat;
    const otherCats=Object.keys(CATEGORIES).filter(c=>c!==m.cat).sort(()=>Math.random()-.5).slice(0,3);
    options=[correctAnswer,...otherCats].sort(()=>Math.random()-.5);
  }

  const wrap=document.getElementById('quizOptions');
  wrap.innerHTML=options.map((o,i)=>
    `<div class="quiz-opt" data-correct="${o===correctAnswer?1:0}" data-metric="${m.id}" onclick="quizAnswer(this)">${o}</div>`
  ).join('');

  document.getElementById('quizStreak').innerHTML=`&#128293; Серия: ${state.quiz.streak}`;
  document.getElementById('quizScore').textContent=`Счёт: ${state.quiz.score}`;
}

function quizAnswer(el){
  if(quizAnswered)return;
  quizAnswered=true;
  const correct=el.dataset.correct==='1';
  const metricId=el.dataset.metric;

  if(correct){
    el.classList.add('correct');
    state.quiz.score+=10;
    state.quiz.streak++;
    state.quiz.correct++;
    if(state.quiz.streak>state.quiz.bestStreak)state.quiz.bestStreak=state.quiz.streak;
  }else{
    el.classList.add('wrong');
    el.classList.add('shake');
    state.quiz.streak=0;
    const cs=getCardState(metricId);
    cs.interval=1;cs.nextReview=0;cs.mastered=false;
    document.querySelectorAll('.quiz-opt').forEach(o=>{
      if(o.dataset.correct==='1')o.classList.add('correct');
      else if(!o.classList.contains('wrong'))o.classList.add('dimmed');
    });
  }
  state.quiz.total++;
  saveState();

  document.querySelectorAll('.quiz-opt').forEach(o=>{
    if(!o.classList.contains('correct')&&!o.classList.contains('wrong'))o.classList.add('dimmed');
  });

  document.getElementById('quizStreak').innerHTML=`&#128293; Серия: ${state.quiz.streak}`;
  document.getElementById('quizScore').textContent=`Счёт: ${state.quiz.score}`;
  document.getElementById('quizNext').classList.add('visible');
}

function nextQuizQuestion(){generateQuizQuestion()}

// ─── PROGRESS TAB ───
function renderProgressTab(){
  const area=document.getElementById('progressArea');
  const totalMastered=METRICS.filter(m=>getCardState(m.id).mastered).length;
  const totalReview=METRICS.length-totalMastered;
  const accuracy=state.quiz.total?Math.round(state.quiz.correct/state.quiz.total*100):0;

  let html=`
    <div class="big-stats">
      <div class="big-stat"><div class="num">${totalMastered}</div><div class="lbl">Изучено</div></div>
      <div class="big-stat"><div class="num">${totalReview}</div><div class="lbl">На повторение</div></div>
      <div class="big-stat"><div class="num">${state.dayStreak||0}</div><div class="lbl">Дней подряд</div></div>
      <div class="big-stat"><div class="num">${accuracy}%</div><div class="lbl">Точность квиза</div></div>
    </div>
    <div class="stat-card"><h3>По категориям</h3>`;

  Object.keys(CATEGORIES).forEach(cat=>{
    const c=CATEGORIES[cat];
    const items=METRICS.filter(m=>m.cat===cat);
    const mastered=items.filter(m=>getCardState(m.id).mastered).length;
    const pct=items.length?Math.round(mastered/items.length*100):0;
    html+=`<div class="stat-row">
      <span class="label"><span class="cat-dot" style="background:${c.color}"></span>${c.emoji} ${cat}</span>
      <span class="bar-wrap"><span class="bar-fill" style="width:${pct}%;background:${c.color}"></span></span>
      <span class="val">${mastered}/${items.length}</span>
    </div>`;
  });

  html+=`</div>
    <div class="stat-card"><h3>Квиз</h3>
      <div class="stat-row"><span class="label">Всего вопросов</span><span class="val">${state.quiz.total}</span></div>
      <div class="stat-row"><span class="label">Правильных</span><span class="val">${state.quiz.correct}</span></div>
      <div class="stat-row"><span class="label">Лучшая серия</span><span class="val">${state.quiz.bestStreak}</span></div>
    </div>
    <button class="reset-btn" onclick="if(confirm('Сбросить весь прогресс?')){state=defaultState();saveState();init()}">Сбросить прогресс</button>`;

  area.innerHTML=html;
}

// ─── TABS ───
function switchTab(el){
  if(typeof el==='string'){
    el=document.querySelector(`.tab[data-tab="panel${el.charAt(0).toUpperCase()+el.slice(1)}"]`)||
       document.querySelector(`.tab[data-tab="${el}"]`);
    if(!el)return;
  }
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(el.dataset.tab).classList.add('active');

  if(el.dataset.tab==='panelQuiz')generateQuizQuestion();
  if(el.dataset.tab==='panelProgress')renderProgressTab();
  if(el.dataset.tab==='panelCards'){buildDeck();showNextCard()}
}

// ─── INIT ───
function init(){
  loadState();
  renderFilterChips();
  buildDeck();
  showNextCard();
}

init();
</script>
